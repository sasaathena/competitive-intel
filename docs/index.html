<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>競品情報 · EIP & CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset ──────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
:root {
  /* Beige × Forest Green palette */
  --sand-50:  #FAFAF5;
  --sand-100: #F5F3EC;
  --sand-200: #EDE9DC;
  --sand-300: #DDD8C6;
  --sand-400: #C8C0A8;
  --sand-500: #A89F87;
  --sand-600: #857A62;

  --moss-50:  #EEF3EF;
  --moss-100: #CFDDD1;
  --moss-200: #9DBEA1;
  --moss-300: #6A9B70;
  --moss-400: #3D7245;
  --moss-500: #2A5430;   /* primary */
  --moss-600: #1C3B21;
  --moss-700: #112416;

  --warm-red: #C0503A;
  --warm-amber: #B5803A;
  --warm-sky: #3A6E8C;

  --bg:        var(--sand-50);
  --bg2:       #FFFFFF;
  --bg3:       var(--sand-100);
  --border:    var(--sand-300);
  --border2:   var(--sand-400);
  --text:      #1C1A14;
  --text2:     #5A5646;
  --text3:     #8A8472;

  --serif: 'Playfair Display', Georgia, serif;
  --sans:  'DM Sans', sans-serif;
  --mono:  'DM Mono', monospace;
  --r: 6px;
  --r2: 10px;
  --r3: 16px;
}

html { font-size: 15px; scroll-behavior: smooth }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}
a { color: inherit; text-decoration: none }
button { font-family: var(--sans); cursor: pointer; border: none; background: none }
input  { font-family: var(--sans) }
::-webkit-scrollbar { width: 5px }
::-webkit-scrollbar-track { background: var(--sand-100) }
::-webkit-scrollbar-thumb { background: var(--sand-400); border-radius: 3px }

/* ── Layout ─────────────────────────────────────────────────── */
.app { display: flex; min-height: 100vh }

/* ── Sidebar ─────────────────────────────────────────────────── */
.sidebar {
  width: 232px;
  flex-shrink: 0;
  background: var(--moss-600);
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow-y: auto;
}
.sidebar-top {
  padding: 28px 22px 20px;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 6px;
}
.logo-mark {
  width: 32px; height: 32px;
  background: var(--sand-200);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--serif);
  font-size: 15px;
  font-weight: 600;
  color: var(--moss-600);
  flex-shrink: 0;
}
.logo-name {
  font-family: var(--serif);
  font-size: 17px;
  font-weight: 500;
  color: var(--sand-100);
  letter-spacing: .01em;
}
.logo-sub {
  font-size: 11px;
  color: rgba(255,255,255,.38);
  font-family: var(--mono);
  letter-spacing: .04em;
}

.nav-section { padding: 18px 12px 6px }
.nav-label {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: rgba(255,255,255,.28);
  padding: 0 10px;
  margin-bottom: 5px;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 9px;
  padding: 8px 10px;
  border-radius: var(--r);
  font-size: 13.5px;
  color: rgba(255,255,255,.55);
  cursor: pointer;
  transition: all .15s;
  margin-bottom: 1px;
}
.nav-item:hover { background: rgba(255,255,255,.07); color: rgba(255,255,255,.85) }
.nav-item.active { background: rgba(255,255,255,.12); color: #fff }
.nav-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}
.nd-eip { background: var(--sand-300) }
.nd-crm { background: var(--moss-200) }
.nd-all { background: rgba(255,255,255,.4) }
.nd-rss { background: var(--warm-amber) }
.nav-count {
  margin-left: auto;
  font-size: 11px;
  font-family: var(--mono);
  color: rgba(255,255,255,.28);
  background: rgba(255,255,255,.06);
  padding: 1px 7px;
  border-radius: 10px;
}

.sync-footer {
  margin-top: auto;
  padding: 16px 22px;
  border-top: 1px solid rgba(255,255,255,.07);
  font-size: 11px;
  color: rgba(255,255,255,.3);
}
.sync-row {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 3px;
  font-family: var(--mono);
}
.sync-led {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #6ECC7A;
  animation: blink 3s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── Main ───────────────────────────────────────────────────── */
.main { flex: 1; overflow: hidden }

/* ── Topbar ─────────────────────────────────────────────────── */
.topbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 14px 32px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 40;
}
.page-heading {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 500;
  color: var(--text);
  flex: 1;
  letter-spacing: -.01em;
}
.search-wrap { position: relative }
.search-icon {
  position: absolute;
  left: 11px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  color: var(--text3);
  pointer-events: none;
}
.search-input {
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 7px 14px 7px 34px;
  font-size: 13px;
  color: var(--text);
  width: 210px;
  outline: none;
  transition: border-color .15s, width .2s, box-shadow .15s;
}
.search-input::placeholder { color: var(--text3) }
.search-input:focus {
  border-color: var(--moss-400);
  width: 260px;
  box-shadow: 0 0 0 3px rgba(42,84,48,.08);
}
.refresh-btn {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--bg3);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  color: var(--text2);
  font-size: 16px;
  transition: all .15s;
}
.refresh-btn:hover { background: var(--moss-50); border-color: var(--moss-300); color: var(--moss-500) }

/* ── Content ─────────────────────────────────────────────────── */
.content { padding: 26px 32px 48px }

/* ── Metrics ─────────────────────────────────────────────────── */
.metrics-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}
.metric {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 16px 18px;
  transition: border-color .18s;
  position: relative;
  overflow: hidden;
}
.metric::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 3px;
  height: 100%;
}
.metric.m-green::before { background: var(--moss-400) }
.metric.m-sand::before  { background: var(--sand-400) }
.metric.m-red::before   { background: var(--warm-red) }
.metric.m-sky::before   { background: var(--warm-sky) }
.metric:hover { border-color: var(--border2) }
.metric-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 10px;
}
.metric-icon {
  font-size: 16px;
  opacity: .55;
}
.metric-badge {
  font-size: 10px;
  font-family: var(--mono);
  padding: 2px 7px;
  border-radius: 10px;
}
.mb-up   { background: #E8F3EB; color: #2A5430 }
.mb-gray { background: var(--sand-100); color: var(--text3) }
.metric-val { font-family: var(--serif); font-size: 30px; font-weight: 500; letter-spacing: -.03em; line-height: 1 }
.metric-lbl { font-size: 11.5px; color: var(--text3); margin-top: 5px }

/* ── Filter Bar ─────────────────────────────────────────────── */
.filter-wrap {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 14px 18px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.filter-group {
  display: flex;
  align-items: center;
  gap: 6px;
}
.filter-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text3);
  letter-spacing: .06em;
  text-transform: uppercase;
  white-space: nowrap;
}
.filter-sep { width: 1px; height: 18px; background: var(--border); margin: 0 4px }
.chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  color: var(--text2);
  background: transparent;
  transition: all .15s;
}
.chip:hover { border-color: var(--border2); color: var(--text); background: var(--sand-100) }
.chip.active { border-color: transparent; color: #fff }
.chip-all.active  { background: var(--moss-500) }
.chip-eip.active  { background: var(--moss-400) }
.chip-crm.active  { background: var(--warm-sky) }
.chip-ux.active   { background: var(--moss-500) }
.chip-feat.active { background: var(--warm-amber) }
.chip-trend.active{ background: var(--sand-600) }
.chip-dash.active { background: var(--warm-sky) }

/* ── List Header ─────────────────────────────────────────────── */
.list-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}
.result-label {
  font-family: var(--serif);
  font-size: 15px;
  font-style: italic;
  color: var(--text3);
}
.result-label span { color: var(--text); font-style: normal; font-weight: 500 }
.sort-group { display: flex; gap: 6px }
.sort-btn {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 5px 11px;
  border-radius: var(--r);
  font-size: 12px;
  color: var(--text3);
  border: 1px solid var(--border);
  background: var(--bg2);
  transition: all .15s;
}
.sort-btn:hover, .sort-btn.active {
  border-color: var(--moss-300);
  color: var(--moss-600);
  background: var(--moss-50);
}

/* ── Cards Grid ─────────────────────────────────────────────── */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}

/* ── Card ───────────────────────────────────────────────────── */
.card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r3);
  overflow: hidden;
  cursor: pointer;
  transition: border-color .18s, transform .2s, box-shadow .2s;
  display: flex;
  flex-direction: column;
}
.card:hover {
  border-color: var(--sand-400);
  transform: translateY(-3px);
  box-shadow: 0 12px 32px rgba(28,26,20,.09);
}

/* Thumbnail */
.card-thumb {
  width: 100%;
  height: 148px;
  overflow: hidden;
  position: relative;
  background: var(--sand-100);
  flex-shrink: 0;
}
.card-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
  transition: transform .4s ease;
  display: block;
}
.card:hover .card-thumb img { transform: scale(1.04) }
.thumb-placeholder {
  width: 100%; height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 8px;
}
.thumb-icon { font-size: 28px; opacity: .25 }
.thumb-brand {
  font-family: var(--serif);
  font-size: 13px;
  font-weight: 500;
  color: var(--text3);
  opacity: .5;
}

/* System badge on thumb */
.thumb-badge {
  position: absolute;
  top: 10px;
  left: 10px;
  font-size: 10px;
  font-weight: 500;
  font-family: var(--mono);
  padding: 3px 8px;
  border-radius: 10px;
  letter-spacing: .04em;
}
.tb-eip { background: var(--moss-600); color: var(--sand-100) }
.tb-crm { background: var(--warm-sky); color: #fff }

/* ZH-TW badge */
.thumb-zhtw {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 10px;
  font-family: var(--mono);
  background: rgba(255,255,255,.9);
  color: var(--moss-600);
  padding: 2px 7px;
  border-radius: 10px;
  font-weight: 500;
}

/* Card body */
.card-body { padding: 14px 16px 16px; flex: 1; display: flex; flex-direction: column; gap: 10px }
.card-source-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-source {
  font-size: 11px;
  color: var(--text3);
  font-family: var(--mono);
}
.card-bm {
  width: 24px; height: 24px;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  color: var(--text3);
  font-size: 14px;
  transition: all .15s;
  background: transparent;
  border: none;
  cursor: pointer;
}
.card-bm:hover { color: var(--moss-500); background: var(--moss-50) }
.card-bm.saved { color: var(--moss-500) }

.card-title {
  font-size: 14px;
  font-weight: 500;
  line-height: 1.5;
  color: var(--text);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-summary {
  font-size: 12px;
  line-height: 1.65;
  color: var(--text2);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-tags { display: flex; gap: 5px; flex-wrap: wrap }
.tag {
  font-size: 11px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 10px;
}
.tag-ux    { background: #EEF3EF; color: var(--moss-500) }
.tag-feat  { background: #FAF2E4; color: #7A5520 }
.tag-trend { background: var(--sand-100); color: var(--sand-600) }
.tag-dash  { background: #E8F0F5; color: var(--warm-sky) }

.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: auto;
}
.card-date {
  font-size: 11px;
  color: var(--text3);
  font-family: var(--mono);
}
.card-open {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 500;
  color: var(--moss-500);
  padding: 4px 10px;
  border-radius: var(--r);
  border: 1px solid var(--moss-200);
  background: var(--moss-50);
  transition: all .15s;
}
.card-open:hover { background: var(--moss-500); color: #fff; border-color: var(--moss-500) }

/* ── Empty / Loading ─────────────────────────────────────────── */
.state-box {
  text-align: center;
  padding: 64px 24px;
  color: var(--text3);
}
.state-box .icon { font-size: 36px; margin-bottom: 12px; opacity: .3 }
.state-box p { font-family: var(--serif); font-size: 16px; font-style: italic }
.state-box small { font-size: 12px; display: block; margin-top: 6px }
.spinner {
  width: 28px; height: 28px;
  border: 2px solid var(--border);
  border-top-color: var(--moss-400);
  border-radius: 50%;
  margin: 0 auto 14px;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg) } }

/* ── Distribution ────────────────────────────────────────────── */
.dist-row {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: var(--r2);
  padding: 16px 20px;
  margin-bottom: 20px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
.dist-group h4 {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: .09em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 12px;
}
.dist-item {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.dist-name { font-size: 12px; color: var(--text2); width: 76px; flex-shrink: 0 }
.dist-track { flex: 1; height: 4px; background: var(--sand-200); border-radius: 2px; overflow: hidden }
.dist-fill  { height: 100%; border-radius: 2px; transition: width .7s ease }
.df-moss  { background: var(--moss-400) }
.df-sky   { background: var(--warm-sky) }
.df-amber { background: var(--warm-amber) }
.df-red   { background: var(--warm-red) }
.df-sand  { background: var(--sand-500) }
.dist-num { font-size: 11px; font-family: var(--mono); color: var(--text3); width: 22px; text-align: right }

/* ── Toast ───────────────────────────────────────────────────── */
.toast {
  position: fixed;
  bottom: 24px; right: 24px;
  background: var(--moss-600);
  color: var(--sand-100);
  font-size: 13px;
  padding: 11px 16px;
  border-radius: var(--r2);
  box-shadow: 0 6px 20px rgba(0,0,0,.2);
  transform: translateY(64px);
  opacity: 0;
  transition: all .25s;
  z-index: 99;
}
.toast.show { transform: translateY(0); opacity: 1 }

/* ── Card animation ──────────────────────────────────────────── */
.card { animation: fadeUp .3s ease both }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px) }
  to   { opacity: 1; transform: translateY(0) }
}
.card:nth-child(1){animation-delay:.04s}
.card:nth-child(2){animation-delay:.08s}
.card:nth-child(3){animation-delay:.12s}
.card:nth-child(4){animation-delay:.16s}
.card:nth-child(5){animation-delay:.20s}
.card:nth-child(6){animation-delay:.24s}
.card:nth-child(7){animation-delay:.28s}
.card:nth-child(8){animation-delay:.32s}
.card:nth-child(9){animation-delay:.36s}

/* ── Responsive ──────────────────────────────────────────────── */
@media (max-width: 1100px) {
  .cards-grid { grid-template-columns: repeat(2,1fr) }
  .metrics-row { grid-template-columns: repeat(2,1fr) }
}
@media (max-width: 720px) {
  .sidebar { display: none }
  .content { padding: 16px }
  .cards-grid { grid-template-columns: 1fr }
}
</style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="logo">
        <div class="logo-mark">情</div>
        <span class="logo-name">競品情報</span>
      </div>
      <div class="logo-sub">EIP &amp; CRM · UIUX 設計師視角</div>
    </div>

    <div class="nav-section">
      <div class="nav-label">來源管道</div>
      <div class="nav-item active" onclick="setChannel(this,'')" data-ch="">
        <div class="nav-dot nd-all"></div>全部來源
        <span class="nav-count" id="cnt-all">0</span>
      </div>
      <div class="nav-item" onclick="setChannel(this,'rss')" data-ch="rss">
        <div class="nav-dot nd-rss"></div>官方品牌 RSS
        <span class="nav-count" id="cnt-rss">0</span>
      </div>
    </div>

    <div class="nav-section">
      <div class="nav-label">核心系統</div>
      <div class="nav-item" onclick="setSystem(this,'EIP')" data-sys="EIP">
        <div class="nav-dot nd-eip"></div>EIP · 人資系統
        <span class="nav-count" id="cnt-EIP">0</span>
      </div>
      <div class="nav-item" onclick="setSystem(this,'CRM')" data-sys="CRM">
        <div class="nav-dot nd-crm"></div>CRM · 客戶關係
        <span class="nav-count" id="cnt-CRM">0</span>
      </div>
    </div>

    <div class="sync-footer">
      <div class="sync-row">
        <div class="sync-led"></div>自動同步正常
      </div>
      <div id="sync-time" style="font-family:var(--mono)">—</div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main">

    <!-- Topbar -->
    <div class="topbar">
      <div class="page-heading" id="page-heading">全部情報</div>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input class="search-input" type="text" placeholder="搜尋品牌、功能、關鍵字…" id="search-input" oninput="onSearch()">
      </div>
      <button class="refresh-btn" onclick="loadData()" title="重新整理">↻</button>
    </div>

    <!-- Content -->
    <div class="content">

      <!-- Loading -->
      <div id="loading" class="state-box">
        <div class="spinner"></div>
        <p>載入情報資料中…</p>
      </div>

      <!-- Metrics -->
      <div class="metrics-row" id="metrics-row" style="display:none">
        <div class="metric m-green">
          <div class="metric-top">
            <span class="metric-icon">📋</span>
            <span class="metric-badge mb-up" id="badge-new">+0 今日</span>
          </div>
          <div class="metric-val" id="m-total">0</div>
          <div class="metric-lbl">累積情報總數</div>
        </div>
        <div class="metric m-sand">
          <div class="metric-top">
            <span class="metric-icon">🇹🇼</span>
            <span class="metric-badge mb-gray">繁中優先</span>
          </div>
          <div class="metric-val" id="m-zhtw">0</div>
          <div class="metric-lbl">繁體中文內容</div>
        </div>
        <div class="metric m-sky">
          <div class="metric-top">
            <span class="metric-icon">✦</span>
            <span class="metric-badge mb-gray">體驗精選</span>
          </div>
          <div class="metric-val" id="m-ux">0</div>
          <div class="metric-lbl">用戶體驗文章</div>
        </div>
        <div class="metric m-red">
          <div class="metric-top">
            <span class="metric-icon">📊</span>
            <span class="metric-badge mb-gray">排除財經</span>
          </div>
          <div class="metric-val" id="m-skip">0</div>
          <div class="metric-lbl">財經新聞已過濾</div>
        </div>
      </div>

      <!-- Distribution -->
      <div class="dist-row" id="dist-row" style="display:none">
        <div class="dist-group">
          <h4>系統分布</h4>
          <div id="dist-systems"></div>
        </div>
        <div class="dist-group">
          <h4>類型分布</h4>
          <div id="dist-types"></div>
        </div>
      </div>

      <!-- Filter -->
      <div class="filter-wrap" id="filter-wrap" style="display:none">
        <div class="filter-group">
          <span class="filter-label">系統</span>
          <button class="chip chip-all active" onclick="setSys(this,'')">全部</button>
          <button class="chip chip-eip" onclick="setSys(this,'EIP')">EIP / 人資</button>
          <button class="chip chip-crm" onclick="setSys(this,'CRM')">CRM / 客戶</button>
        </div>
        <div class="filter-sep"></div>
        <div class="filter-group">
          <span class="filter-label">情報類型</span>
          <button class="chip chip-all active" onclick="setType(this,'')">全部</button>
          <button class="chip chip-ux"   onclick="setType(this,'用戶體驗')">用戶體驗</button>
          <button class="chip chip-feat" onclick="setType(this,'功能更新')">功能更新</button>
          <button class="chip chip-trend"onclick="setType(this,'產業趨勢')">產業趨勢</button>
          <button class="chip chip-dash" onclick="setType(this,'Dashboard案例')">Dashboard案例</button>
        </div>
        <div class="filter-sep"></div>
        <div class="filter-group">
          <button class="chip chip-all" id="zhtw-btn" onclick="toggleZhtw(this)">🇹🇼 繁中優先</button>
        </div>
      </div>

      <!-- List header -->
      <div class="list-header" id="list-header" style="display:none">
        <div class="result-label">共 <span id="shown-count">0</span> 筆情報</div>
        <div class="sort-group">
          <button class="sort-btn active" id="sort-score" onclick="setSort('score')">✦ 相關度</button>
          <button class="sort-btn" id="sort-date" onclick="setSort('date')">最新</button>
        </div>
      </div>

      <!-- Cards -->
      <div class="cards-grid" id="cards-grid"></div>

      <!-- Empty -->
      <div class="state-box" id="empty-state" style="display:none">
        <div class="icon">◎</div>
        <p>沒有符合條件的情報</p>
        <small>試試放寬篩選條件</small>
      </div>

    </div><!-- .content -->
  </div><!-- .main -->
</div><!-- .app -->

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ── State ──────────────────────────────────────────────────────
let all = [];
let filterSys     = '';
let filterType    = '';
let filterChannel = '';
let filterZhtw    = false;
let searchQ       = '';
let sortMode      = 'score';
let bookmarks     = JSON.parse(localStorage.getItem('ci-bm') || '[]');

// ── Load ───────────────────────────────────────────────────────
async function loadData() {
  show('loading');
  hide('metrics-row','dist-row','filter-wrap','list-header','cards-grid','empty-state');

  try {
    const r = await fetch('data/articles.json?t=' + Date.now());
    if (!r.ok) throw new Error(r.status);
    const d = await r.json();
    all = d.articles || [];
    applyStats(d.stats || {});
    hide('loading');
    show('metrics-row','dist-row','filter-wrap','list-header');
    render();
  } catch(e) {
    document.getElementById('loading').innerHTML =
      `<div class="icon">⚠</div><p>無法載入 data/articles.json</p><small>請確認爬蟲已執行或路徑正確</small>`;
  }
}

function applyStats(s) {
  setText('m-total', s.total ?? 0);
  setText('m-zhtw',  s.zhtw_count ?? 0);
  setText('m-ux',    s.by_type?.['用戶體驗'] ?? 0);
  setText('m-skip',  s.skipped_finance ?? 0);
  setText('badge-new', '+' + (s.new_today ?? 0) + ' 今日');
  setText('cnt-all', s.total ?? 0);
  setText('cnt-rss', s.by_channel?.rss ?? 0);
  setText('cnt-EIP', s.by_system?.EIP ?? 0);
  setText('cnt-CRM', s.by_system?.CRM ?? 0);

  const t = s.last_updated ? new Date(s.last_updated).toLocaleString('zh-TW',{
    month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'
  }) : '—';
  setText('sync-time', t);

  renderDist('dist-systems', s.by_system || {},
    {EIP:'df-moss', CRM:'df-sky'});
  renderDist('dist-types', s.by_type || {},
    {'用戶體驗':'df-moss','功能更新':'df-amber','產業趨勢':'df-sand','Dashboard案例':'df-sky'});
}

function renderDist(id, data, colors) {
  const max = Math.max(...Object.values(data), 1);
  document.getElementById(id).innerHTML = Object.entries(data)
    .sort((a,b) => b[1]-a[1])
    .map(([k,v]) => `
    <div class="dist-item">
      <span class="dist-name">${k}</span>
      <div class="dist-track"><div class="dist-fill ${colors[k]||'df-sand'}" style="width:${Math.round(v/max*100)}%"></div></div>
      <span class="dist-num">${v}</span>
    </div>`).join('');
}

// ── Filters ────────────────────────────────────────────────────
function setSys(el, v) {
  filterSys = v;
  el.closest('.filter-group').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}
function setType(el, v) {
  filterType = v;
  el.closest('.filter-group').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}
function setChannel(el, v) {
  filterChannel = v;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  const labels = {'':`全部情報`, rss:`官方品牌 RSS`};
  setText('page-heading', labels[v] || v);
  render();
}
function setSystem(el, v) {
  const same = filterSys === v;
  filterSys = same ? '' : v;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  if (!same) {
    el.classList.add('active');
    const labels = {EIP:'EIP · 人資系統', CRM:'CRM · 客戶關係'};
    setText('page-heading', labels[v]);
  } else {
    document.querySelector('[data-ch=""]').classList.add('active');
    setText('page-heading','全部情報');
  }
  render();
}
function toggleZhtw(el) {
  filterZhtw = !filterZhtw;
  el.classList.toggle('active', filterZhtw);
  render();
}
function setSort(m) {
  sortMode = m;
  document.getElementById('sort-score').classList.toggle('active', m==='score');
  document.getElementById('sort-date').classList.toggle('active',  m==='date');
  render();
}
function onSearch() {
  searchQ = document.getElementById('search-input').value.trim().toLowerCase();
  render();
}

// ── Render ─────────────────────────────────────────────────────
function render() {
  let items = all.filter(a => {
    if (filterChannel && a.channel !== filterChannel) return false;
    if (filterSys     && !a.systems?.includes(filterSys)) return false;
    if (filterType    && !a.types?.includes(filterType))  return false;
    if (filterZhtw    && !a.is_zhtw) return false;
    if (searchQ) {
      const hay = (a.title + a.summary + a.source + (a.types||[]).join(' ')).toLowerCase();
      if (!hay.includes(searchQ)) return false;
    }
    return true;
  });

  if (sortMode === 'date') {
    items.sort((a,b) => new Date(b.date) - new Date(a.date));
  } else {
    items.sort((a,b) => {
      // 繁中優先，再依 score
      if (a.is_zhtw && !b.is_zhtw) return -1;
      if (!a.is_zhtw && b.is_zhtw) return 1;
      return (b.score||0) - (a.score||0);
    });
  }

  setText('shown-count', items.length);
  show('list-header');

  const grid = document.getElementById('cards-grid');
  const empty = document.getElementById('empty-state');

  if (items.length === 0) {
    grid.innerHTML = '';
    show('empty-state');
    return;
  }
  hide('empty-state');
  grid.innerHTML = items.map(renderCard).join('');
}

// ── Card HTML ──────────────────────────────────────────────────
const SYS_CLS  = {EIP:'tb-eip', CRM:'tb-crm'};
const TYPE_CLS = {'用戶體驗':'tag-ux','功能更新':'tag-feat','產業趨勢':'tag-trend','Dashboard案例':'tag-dash'};
const THUMB_COLORS = {
  EIP: 'background:linear-gradient(135deg,#CFDDD1 0%,#EEF3EF 100%)',
  CRM: 'background:linear-gradient(135deg,#D3E4EE 0%,#EEF4F7 100%)',
};
const THUMB_ICONS = {EIP:'👤', CRM:'🤝', default:'📄'};

function renderCard(a) {
  const sys   = (a.systems||['EIP'])[0];
  const bm    = bookmarks.includes(a.id);
  const tags  = (a.types||[]).slice(0,3);
  const rel   = relTime(a.date);
  const safeUrl = esc(a.url);
  const safeId  = esc(a.id);

  const thumbHtml = a.thumbnail
    ? `<img src="${esc(a.thumbnail)}" alt="" loading="lazy" onerror="this.parentNode.innerHTML=fallbackThumb('${sys}')">`
    : `<div class="thumb-placeholder" style="${THUMB_COLORS[sys]||''}">
        <div class="thumb-icon">${THUMB_ICONS[sys]||THUMB_ICONS.default}</div>
        <div class="thumb-brand">${esc(a.source)}</div>
       </div>`;

  const tagHtml = tags.map(t =>
    `<span class="tag ${TYPE_CLS[t]||'tag-trend'}">${t}</span>`).join('');

  return `
  <div class="card" onclick="openCard('${safeUrl}')">
    <div class="card-thumb">
      ${thumbHtml}
      <span class="thumb-badge ${SYS_CLS[sys]||'tb-eip'}">${sys}</span>
      ${a.is_zhtw ? '<span class="thumb-zhtw">繁中</span>' : ''}
    </div>
    <div class="card-body">
      <div class="card-source-row">
        <span class="card-source">${esc(a.source)}</span>
        <button class="card-bm ${bm?'saved':''}" onclick="toggleBm(event,'${safeId}')" title="收藏">
          ${bm ? '★' : '☆'}
        </button>
      </div>
      <div class="card-title">${esc(a.title)}</div>
      ${a.summary ? `<div class="card-summary">${esc(a.summary)}</div>` : ''}
      <div class="card-tags">${tagHtml}</div>
      <div class="card-footer">
        <span class="card-date">${rel}</span>
        <span class="card-open">前往 →</span>
      </div>
    </div>
  </div>`;
}

function fallbackThumb(sys) {
  return `<div class="thumb-placeholder" style="${THUMB_COLORS[sys]||''}">
    <div class="thumb-icon">${THUMB_ICONS[sys]||'📄'}</div>
  </div>`;
}

// ── Actions ────────────────────────────────────────────────────
function openCard(url) { window.open(url, '_blank', 'noopener') }

function toggleBm(e, id) {
  e.stopPropagation();
  if (bookmarks.includes(id)) {
    bookmarks = bookmarks.filter(b => b !== id);
    toast('已取消收藏');
  } else {
    bookmarks.push(id);
    toast('已加入收藏 ★');
  }
  localStorage.setItem('ci-bm', JSON.stringify(bookmarks));
  render();
}

// ── Helpers ────────────────────────────────────────────────────
function relTime(iso) {
  if (!iso) return '—';
  const d = (Date.now() - new Date(iso)) / 1000;
  if (d < 3600)  return Math.floor(d/60)   + ' 分鐘前';
  if (d < 86400) return Math.floor(d/3600) + ' 小時前';
  return Math.floor(d/86400) + ' 天前';
}
function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function setText(id, v) {
  const el = document.getElementById(id);
  if (el) el.textContent = v;
}
function show(...ids) { ids.forEach(id => { const el = document.getElementById(id); if(el) el.style.display='' }) }
function hide(...ids) { ids.forEach(id => { const el = document.getElementById(id); if(el) el.style.display='none' }) }

let _toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── Init ───────────────────────────────────────────────────────
loadData();
</script>
</body>
</html>
