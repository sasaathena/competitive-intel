name: 每日競品情報收集

on:
  schedule:
    # 每天台灣時間 09:00（UTC+8 = UTC 01:00）
    - cron: "0 1 * * *"
  # 也可手動在 GitHub Actions 頁面觸發
  workflow_dispatch:

permissions:
  contents: write   # 允許推送 data/articles.json

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. 取得程式碼（包含昨天的 data/articles.json）
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2. 設定 Python
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      # 3. 安裝相依套件
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. 執行爬蟲
      - name: Run scraper
        run: python collect.py

      # 5. 同步資料到 GitHub Pages
      - name: Sync data to docs
        run: |
          mkdir -p docs/data
          if [ -f "data/articles.json" ]; then
            cp data/articles.json docs/data/articles.json
            fi
        if [ -f "data/seen_ids.json" ]; then
        cp data/seen_ids.json docs/data/seen_ids.json
        fi


      # 6. 如果有任何異動，commit 並 push 回 GitHub
      - name: Commit & push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 強制讓 Git 去掃描 data 和 docs 資料夾
          git add data/ docs/ || true
          # 只在有異動時才 commit（避免空 commit 出錯）
          git diff --cached --quiet || \
            git commit -m "chore: 自動更新競品情報 $(date +'%Y-%m-%d')"
          git push
