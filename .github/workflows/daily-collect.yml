name: 每日競品情報收集

on:
  schedule:
    # 台灣時間早上 09:00 (等於 UTC 01:00)
    - cron: '0 1 * * *'
  workflow_dispatch: # 允許你在網頁上點擊 Run workflow 手動觸發

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 1. 檢查並載入程式碼
      uses: actions/checkout@v4

    - name: 2. 設定 Python 環境
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        # 註：這裡移除了會導致報錯的 cache 與 scraper 路徑設定

    - name: 3. 安裝 Python 依賴套件
      run: |
        python -m pip install --upgrade pip
        # 如果最外層有 requirements.txt 就安裝，沒有的話也可以直接補上你要的套件
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # 萬一你沒有 requirements.txt，可以把下面這行的 # 拿掉，手動填入你的套件：
        # pip install requests beautifulsoup4

    - name: 4. 執行爬蟲主程式
      run: |
        python collect.py

    - name: 5. 🤖 自動將更新後的資料推回 GitHub
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add docs/
        # 檢查是否有新抓到的資料，有話就 commit 並 push 更新網頁
        git diff --quiet && git diff --staged --quiet || (git commit -m "Auto update competitive intel data" && git push)