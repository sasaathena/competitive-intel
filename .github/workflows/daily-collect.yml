name: 每日競品情報收集

on:
  schedule:
    # 每天台灣時間 09:00（UTC+8 = UTC 01:00）
    - cron: "0 1 * * *"
  # 也可手動在 GitHub Actions 頁面觸發
  workflow_dispatch:

permissions:
  contents: write   # 允許推送 data/articles.json

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # 1. 取得程式碼（包含昨天的 data/articles.json）
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # 2. 設定 Python
      - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # 如果你發現還是缺套件，也可以直接在下方指定安裝，例如：
        # pip install requests beautifulsoup4 pandas

      # 3. 安裝相依套件
      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      # 4. 執行爬蟲
      - name: Run scraper
        run: python scraper/collect.py

      # 5. 如果 data/ 有異動，commit 並 push
      - name: Commit & push updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # 只在有異動時才 commit（避免空 commit 出錯）
          git diff --cached --quiet || \
            git commit -m "chore: 自動更新競品情報 $(date +'%Y-%m-%d')"
          git push
